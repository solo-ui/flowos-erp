    // ══════════════════════════════════════════════════════════════════════════
    // GOOGLE APPS SCRIPT API
    // ══════════════════════════════════════════════════════════════════════════
    
    const callGas = (fn, ...args) => new Promise((resolve, reject) => {
      if (typeof google === 'undefined' || !google.script) {
        return reject(new Error('Local env (google is not defined)'));
      }
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[fn](...args);
    });

    const API = {
      load: () => callGas('getAllData'),
      save: (data) => callGas('saveAllData', data),
      callAI: (messages, maxTokens = 1000) => callGas('callAnthropicAPI', messages, maxTokens),
      savePDF: (htmlContent, filename) => callGas('savePDFtoDrive', htmlContent, filename),
      sendEmail: (to, subject, body, htmlContent, filename) => callGas('sendEmailWithPDF', to, subject, body, htmlContent, filename),
      viberLink: (phone, message) => callGas('generateViberLink', phone, message)
    };

    // CONSTANTS & HELPERS
    // ══════════════════════════════════════════════════════════════════════════

    const extractAIText = (result) => {
      if (!result) return "";
      if (typeof result === "string") return result;
      if (result.error) throw new Error(result.error);
      if (Array.isArray(result.content)) {
        return result.content.filter(block => block && block.type === "text").map(block => block.text || "").join("\n");
      }
      return "";
    };

    const parseFirstJSONObject = (rawText, fallback = {}) => {
      const raw = String(rawText || "");
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) return fallback;
      try {
        return JSON.parse(match[0]);
      } catch (error) {
        return fallback;
      }
    };

    const inp = { width: "100%", padding: "7px 10px", borderRadius: 7, border: `1px solid ${C.border}`, background: C.bg, color: C.textPri, fontSize: 13, boxSizing: "border-box", outline: "none" };
    const lbl = { fontSize: 11, color: C.textSec, marginBottom: 3, display: "block", textTransform: "uppercase", letterSpacing: "0.05em" };

    function F({ label, value, onChange, type = "text", ph = "", readOnly = false, small = false }) {

    }

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [loading, setLoading] = useState(true);
  const [clients, setClients] = useState([]);
  const [projects, setProjects] = useState([]);
  const [suppliers, setSuppliers] = useState([]);
  const [settings, setSettings] = useState({});
  const [page, setPage] = useState("dashboard");
  const [ctx, setCtx] = useState({});

  useEffect(() => {
    API.load()
      .then(data => {
        setClients(data.clients || SEED_CLIENTS);
        setProjects(data.projects || SEED_PROJECTS);
        setSuppliers(data.suppliers || SEED_SUPPLIERS);
        setSettings(data.settings || {});
        setLoading(false);
      })
      .catch(err => {
        console.error('Load error:', err);
        setClients(SEED_CLIENTS);
        setProjects(SEED_PROJECTS);
        setSuppliers(SEED_SUPPLIERS);
        setLoading(false);
      });
  }, []);

  const saveTimeoutRef = useRef(null);

  useEffect(() => {
    if (loading) return;
    if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
    saveTimeoutRef.current = setTimeout(() => {
      const data = { clients, projects, suppliers, settings, catalog: {}, standaloneOrders: [] };
      API.save(data).then(() => console.log('✓ Saved')).catch(console.error);
    }, 800);
    return () => {
      if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
    };
  }, [clients, projects, suppliers, settings, loading]);

  const upProject = (id, fn) => setProjects(ps => ps.map(p => p.id===id ? {...p,...fn(p)} : p));
  const nav = (pg, c={}) => { setCtx(c); setPage(pg); };
  const project  = projects.find(p => p.id===ctx.projectId);
  const client   = clients.find(c => c.id===ctx.clientId);

  const clientBal = cid => projects.filter(p=>p.clientId===cid).reduce((s,p)=>{
    const inv  = (p.invoices||[]).reduce((a,i)=>a+(+i.amount||0), 0);
    const paid = (p.payments||[]).reduce((a,x)=>a+(+x.net||0)+(+x.vat||0), 0);
    return s + inv - paid;
  }, 0);

  if (loading) {
    return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', fontSize: 20, fontWeight: 600, color: C.accent, background: C.bg }}>⏳ Φόρτωση...</div>;
  }

  const bg = { display:"flex", height:"100vh", fontFamily:"'Inter',system-ui,sans-serif", fontSize:14, color:C.textPri, background:C.bg, overflow:"hidden" };

  return (
    <div style={bg}>
      <Sidebar page={page} nav={nav}/>
      <main style={{ flex:1, overflowY:"auto", padding:24, background:C.bg }}>
        {page==="dashboard"  && <Dashboard clients={clients} projects={projects} nav={nav} clientBal={clientBal}/>}
        {page==="clients"    && <Clients clients={clients} setClients={setClients} projects={projects} nav={nav} clientBal={clientBal}/>}
        {page==="projects"   && <Projects projects={projects} setProjects={setProjects} clients={clients} nav={nav}/>}
        {page==="workspace"  && project && <Workspace project={project} client={client} upProject={upProject} nav={nav} suppliers={suppliers} settings={settings}/>}
        {page==="suppliers"  && <Suppliers suppliers={suppliers} setSuppliers={setSuppliers}/>}
        {page==="settings"   && <Settings settings={settings} setSettings={setSettings}/>}
        {page==="dbadmin"    && <DBAdmin/>}
      </main>
    </div>
  );
}

// ── Sidebar ───────────────────────────────────────────────────────────────────

// ── Clients ───────────────────────────────────────────────────────────────────

  const [showNew,setShowNew]=useState(false);
  const [form,setForm]=useState({name:"",phone:"",email:"",city:"",category:"Ιδιώτης",source:"Σύσταση"});
  const [del,setDel]=useState(null); const [dc,setDc]=useState("");

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>

          <F label="Ονοματεπώνυμο" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))}/>
          <F label="Τηλέφωνο" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))}/>

        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button style={btn(C.accent)} onClick={()=>{ setClients(cs=>[...cs,{id:uid(),...form}]); setShowNew(false); }}>Αποθήκευση</button>
          <button style={btn(C.border,C.textPri)} onClick={()=>setShowNew(false)}>Ακύρωση</button>
        </div>

// ── Tab Ανάλυση ───────────────────────────────────────────────────────────────

function TabAnalysis({ project, up }) {
  const [aiLoading,setAiLoading]=useState(false);
  const [aiRes,setAiRes]=useState(null);
  const wins=project.windows||[];
  const upW=(id,k,v)=>up({windows:wins.map(w=>w.id===id?{...w,[k]:v}:w)});
  const runAI = async () => {
    setAiLoading(true);
    setAiRes(null);
    const desc = wins.map(w => `Κούφωμα ${w.no}: ${w.type} ${w.series} ${w.typology} ${w.width}x${w.height}`).join("; ");
    try {
      const result = await API.callAI([
        {
          role: "user",
          content: `Ειδικός κατασκευαστής αλουμινίου. Έλεγξε κατασκευές. ΜΟΝΟ JSON: {"checks":[{"no":1,"status":"ok|warning|error","message":"...","suggestions":[]}]}
${desc}`
        }
      ], 600);
      const parsed = parseFirstJSONObject(extractAIText(result), { checks: [] });
      setAiRes(Array.isArray(parsed.checks) ? parsed.checks : []);
    } catch (error) {
      console.error("AI analysis error:", error);
      setAiRes([{ no: "-", status: "error", message: "Αποτυχία AI ελέγχου", suggestions: [] }]);
    }
    setAiLoading(false);
  };
  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div style={{ fontWeight:600 }}>Ανάλυση Κατασκευών</div>
        <button style={{ ...btn(C.accent), opacity:aiLoading?0.7:1 }} onClick={runAI} disabled={aiLoading}>{aiLoading?"AI Ελέγχει...":"🤖 AI Έλεγχος"}</button>
      </div>
      {aiRes&&<div style={{ ...card, marginBottom:12, border:`1px solid ${C.accent}44` }}>
        {aiRes.map((r,i)=><div key={i} style={{ padding:"5px 0", borderBottom:`1px solid ${C.border}`, fontSize:13 }}>
          <span style={{ color:r.status==="ok"?C.green:r.status==="warning"?C.warn:C.red, fontWeight:600 }}>{r.status==="ok"?"✓":"⚠"} Κ{r.no}: </span>
          {r.message} {r.suggestions?.length>0&&<span style={{ color:C.blue }}> → {r.suggestions.join(", ")}</span>}
        </div>)}
      </div>}
      {wins.map(w=>(
        <div key={w.id} style={{ ...card, marginBottom:10 }}>
          <div style={{ fontWeight:600, color:C.accent, marginBottom:10 }}>Κούφωμα {w.no} — {w.type} {w.series} {w.typology}</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8 }}>
            <div><label style={lbl}>Κωδ. Κάσας</label><select style={inp} value={w.kasaCode||""} onChange={e=>upW(w.id,"kasaCode",e.target.value)}><option value="">—</option>{(KASA[w.series]||[]).map(k=><option key={k}>{k}</option>)}</select></div>
            <div><label style={lbl}>Κωδ. Φύλλου</label><select style={inp} value={w.fyloCode||""} onChange={e=>upW(w.id,"fyloCode",e.target.value)}><option value="">—</option>{(FYLO[w.series]||[]).map(k=><option key={k}>{k}</option>)}</select></div>
            <Sel label="Τελική Υάλωση" value={w.glass} onChange={v=>upW(w.id,"glass",v)} opts={GLASSES}/>
            <Sel label="Τελικό Χρώμα"  value={w.color}  onChange={v=>upW(w.id,"color",v)}  opts={COLORS}/>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Tab Παραγγελίες ────────────────────────────────────────────────────────────
function TabOrders({ project, suppliers }) {
  const [active, setActive] = useState("profiles");
  const [selSup, setSelSup] = useState({});
  const [modal,  setModal]  = useState(null); // { type: 'print'|'email'|'viber', content, title }

  const wins = project.windows||[];

  // ── Παραγγελία Προφίλ (από Προμέτρηση) ──
  const profileRows = wins.flatMap(w => [
    { prof:w.kasaCode||`${w.series}-ΚΑΣΑ`, type:"Κάσα Οριζόντια", len:(+w.width||0).toFixed(3), qty:2, win:w.no },
    { prof:w.kasaCode||`${w.series}-ΚΑΣΑ`, type:"Κάσα Κατακόρυφη", len:(+w.height||0).toFixed(3), qty:2, win:w.no },
    { prof:w.fyloCode||`${w.series}-ΦΥΛΛΟ`, type:"Φύλλο Οριζόντιο", len:((+w.width||0)-0.04).toFixed(3), qty:2, win:w.no },
    { prof:w.fyloCode||`${w.series}-ΦΥΛΛΟ`, type:"Φύλλο Κατακόρυφο", len:((+w.height||0)-0.04).toFixed(3), qty:2, win:w.no },
  ]);

  // ── Παραγγελία Τζαμιών (από Κύρια Μέτρηση) ──
  const glassRows = (project.kmWins||wins).map(w => {
    const h=+w.height||0, wi=+w.width||0;
    const leaves=w.typology?.includes("ΤΡΙΦΥΛΛΟ")?3:w.typology?.includes("ΔΙΦΥΛΛΟ")?2:1;
    return { spec:w.glass, w:((wi/leaves)-0.02).toFixed(3), h:(h-0.02).toFixed(3), qty:leaves, win:w.no, color:w.color };
  }).filter(r=>r.w>0);

  // ── Παραγγελία Ρολών (από Κύρια Μέτρηση) ──
  const rolaRows = (project.kmWins||wins).filter(w=>w.rolo&&w.rolo!=="—").map(w=>({
    type:w.rolo, width:(+w.width||0).toFixed(3), series:w.series, motor:w.motor, win:w.no
  }));

  // ── Παραγγελία Εξαρτημάτων (από Κύρια Μέτρηση) ──
  const accRows = (project.kmWins||wins).flatMap(w => {
    const leaves=w.typology?.includes("ΤΡΙΦΥΛΛΟ")?3:w.typology?.includes("ΔΙΦΥΛΛΟ")?2:1;
    const isAnoig=w.type==="ΑΝΟΙΓΟΜΕΝΟ"||w.type==="ΠΟΡΤΑ";
    const isSyr=w.type==="ΣΥΡΟΜΕΝΟ";
    const items=[];
    if(isAnoig){ items.push({name:"Μεντεσέδες",qty:leaves*2,unit:"τεμ",win:w.no}); items.push({name:"Κλειδαριά",qty:leaves,unit:"τεμ",win:w.no}); items.push({name:"Χερούλι",qty:leaves,unit:"τεμ",win:w.no}); }
    if(isSyr){ items.push({name:"Ράουλα",qty:leaves*2,unit:"τεμ",win:w.no}); items.push({name:"Αντιανεμικό",qty:1,unit:"τεμ",win:w.no}); }
    items.push({name:"Παρεμβύσματα",qty:((2*(+w.height||0)+2*(+w.width||0))).toFixed(1),unit:"m",win:w.no});
    return items;
  });

  const ORDERS = {
    profiles:    { label:"Παραγγελία Προφίλ",      icon:"🔩", note:"Από Προμέτρηση", color:C.blue,    rows:profileRows,    cols:["Κούφ.","Προφίλ","Τύπος","Μήκος (m)","Τεμ."],    row:r=>[r.win,r.prof,r.type,r.len,r.qty] },
    glass:       { label:"Παραγγελία Τζαμιών",     icon:"🪟", note:"Από Κύρια Μέτρηση", color:C.blue, rows:glassRows,     cols:["Κούφ.","Υάλωση","Πλάτος (m)","Ύψος (m)","Τεμ.","Χρώμα"], row:r=>[r.win,r.spec,r.w,r.h,r.qty,r.color] },
    rola:        { label:"Παραγγελία Ρολών",        icon:"🌀", note:"Από Κύρια Μέτρηση", color:C.accent,rows:rolaRows,     cols:["Κούφ.","Τύπος Ρολού","Πλάτος (m)","Σειρά","Μοτέρ"], row:r=>[r.win,r.type,r.width,r.series,r.motor] },
    accessories: { label:"Παραγγελία Εξαρτημάτων", icon:"⚙️", note:"Από Κύρια Μέτρηση", color:C.green, rows:accRows,    cols:["Κούφ.","Εξάρτημα","Ποσότητα","Μονάδα"], row:r=>[r.win,r.name,r.qty,r.unit] },
  };

  const o = ORDERS[active];
  const supType = { profiles:"Προφίλ", glass:"Τζάμια", rola:"Ρολά", accessories:"Εξαρτήματα" };
  const filtSup = suppliers.filter(s=>s.type===supType[active]||s.type==="Γενικός");
  const supId   = selSup[active]||filtSup[0]?.id||"";
  const sup     = suppliers.find(s=>s.id===supId);

  const buildMsg = () => {
    const lines = o.rows.map((r,i)=>o.row(r).join(" | "));
    return `Παραγγελία: ${o.label}\nΈργο: ${project.title} (${project.code})\n\n${o.cols.join(" | ")}\n${lines.join("\n")}\n\nΗμερομηνία: ${today()}`;
  };

  const printContent = () => {
    const rows = o.rows.map(r=>`<tr>${o.row(r).map(c=>`<td>${c}</td>`).join("")}</tr>`).join("");
    const html=`<!DOCTYPE html><html lang="el"><head><meta charset="UTF-8"><title>${o.label} — ${project.code}</title><style>
      *{box-sizing:border-box}
      body{font-family:Arial,sans-serif;padding:32px;font-size:12px;color:#222;background:#fff}
      .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:14px;border-bottom:3px solid #c17f4e}
      .co{font-size:18px;font-weight:700;color:#c17f4e}.co-sub{font-size:11px;color:#888;margin-top:2px}
      .doc-title{font-size:15px;font-weight:700;text-align:right}.doc-meta{font-size:11px;color:#666;margin-top:3px}
      .sup-box{background:#f5f3f0;border-left:4px solid #c17f4e;padding:10px 14px;border-radius:6px;margin-bottom:18px;font-size:12px}
      table{width:100%;border-collapse:collapse;margin-bottom:20px}
      thead tr{background:#2d3239;color:#e8e4de}
      th{padding:8px 10px;text-align:left;font-size:12px}
      td{padding:7px 10px;border-bottom:1px solid #eee;font-size:12px}
      tr:nth-child(even) td{background:#faf9f8}
      td:first-child{color:#888}td:nth-child(2){font-weight:600;color:#c17f4e}
      .footer{margin-top:30px;font-size:10px;color:#aaa;text-align:center;border-top:1px solid #eee;padding-top:10px}
      .print-btn{margin-bottom:20px;padding:9px 20px;background:#c17f4e;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600}
      @media print{.print-btn{display:none}body{padding:12mm}}
      @page{size:A4;margin:12mm}
    </style></head><body>
    <button class="print-btn" onclick="window.print()">🖨 Εκτύπωση / Αποθήκευση PDF</button>
    <div class="top">
      <div><div class="co">FlowOS</div><div class="co-sub">Σύστημα ERP Αλουμινίου & Κουφωμάτων</div></div>
      <div><div class="doc-title">${o.icon} ${o.label}</div><div class="doc-meta">${project.code} · ${today()}</div></div>
    </div>
    <p style="margin-bottom:14px;color:#555;font-size:12px"><strong>${project.title}</strong>${project.address?` · ${project.address}`:""}</p>
    ${sup?`<div class="sup-box"><strong>Προμηθευτής:</strong> ${sup.name}${sup.contact?` · ${sup.contact}`:""}${sup.phone?` · ${sup.phone}`:""}${sup.email?` · ${sup.email}`:""}${sup.viber?` · Viber: ${sup.viber}`:""}</div>`:""}
    <table><thead><tr>${o.cols.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${rows}</tbody></table>
    <div class="footer">Παράγεται από FlowOS · ${today()}</div>
    </body></html>`;
    // Κατέβασε ως αρχείο HTML
    const blob = new Blob([html], {type:"text/html;charset=utf-8"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `${o.label.replace(/ /g,"_")}_${project.code}_${today().replace(/\//g,"-")}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setModal({ type:"download_info", title:`${o.icon} ${o.label}` });
  };

  const sendEmail = () => {
    const msg = `Θέμα: ${o.label} — ${project.code}\n\n${buildMsg()}`;
    setModal({ type:"email", title:"✉️ Αποστολή Email", msg, to: sup?.email||"" });
  };

  const sendViber = () => {
    setModal({ type:"viber", title:"📱 Αποστολή Viber", msg: buildMsg(), phone: sup?.viber||"" });
  };

  return (
    <div>
      <div style={{ fontWeight:600, marginBottom:14 }}>Παραγγελίες Υλικών</div>

      {/* Επιλογή τύπου παραγγελίας */}
      <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
        {Object.entries(ORDERS).map(([k,v])=>(
          <button key={k} onClick={()=>setActive(k)} style={{ ...btn(active===k?v.color:C.border, active===k?"#fff":C.textSec), display:"flex", alignItems:"center", gap:6 }}>
            {v.icon} {v.label.replace("Παραγγελία ","")}
          </button>
        ))}
      </div>

      {/* Κεφαλίδα παραγγελίας */}
      <div style={{ ...card, marginBottom:12, border:`1px solid ${o.color}44` }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:10 }}>
          <div>
            <div style={{ fontWeight:600, fontSize:15, color:o.color }}>{o.icon} {o.label}</div>
            <div style={{ fontSize:12, color:C.textSec, marginTop:2 }}>{o.note} · {o.rows.length} γραμμές</div>
          </div>
          <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
            {/* Επιλογή προμηθευτή */}
            {filtSup.length>0&&<div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <label style={{ ...lbl, marginBottom:0, whiteSpace:"nowrap" }}>Προμηθευτής:</label>
              <select style={{ ...inp, width:"auto", padding:"5px 9px", fontSize:12 }} value={supId} onChange={e=>setSelSup(s=>({...s,[active]:e.target.value}))}>
                {filtSup.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>}
            <button style={{ ...btn(C.panel,C.textPri), fontSize:12, border:`1px solid ${C.border}` }} onClick={printContent}>🖨 Εκτύπωση</button>
            <button style={{ ...btn("#4a90d9"), fontSize:12 }} onClick={sendEmail} disabled={!sup?.email}>✉️ Email</button>
            <button style={{ ...btn("#7b5ea7"), fontSize:12 }} onClick={sendViber} disabled={!sup?.viber}>📱 Viber</button>
          </div>
        </div>
        {sup&&<div style={{ marginTop:10, padding:"8px 12px", background:C.bg, borderRadius:7, fontSize:12, color:C.textSec }}>
          <strong style={{ color:C.textPri }}>{sup.name}</strong> · {sup.contact} · {sup.phone} · {sup.email}
          {sup.viber&&<span> · Viber: {sup.viber}</span>}
        </div>}
      </div>

      {/* Πίνακας παραγγελίας */}
      {o.rows.length===0
        ? <div style={{ ...card, color:C.textMut, textAlign:"center" }}>Δεν υπάρχουν δεδομένα. {o.note.includes("Κύρια")?"Συμπληρώστε την Κύρια Μέτρηση.":"Συμπληρώστε την Προμέτρηση."}</div>
        : <table style={{ width:"100%", borderCollapse:"collapse", background:C.card, borderRadius:10, overflow:"hidden" }}>
            <thead><tr>{o.cols.map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
            <tbody>{o.rows.map((r,i)=><tr key={i}>{o.row(r).map((c,j)=><td key={j} style={{ ...td, fontWeight:j===1?500:400, color:j===1?C.accent:C.textPri }}>{c}</td>)}</tr>)}</tbody>
          </table>
      }

      {/* Modal εκτύπωσης / email / viber */}
      {modal && (
        <div onClick={()=>setModal(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 }}>
          <div onClick={e=>e.stopPropagation()} style={{ background:C.panel, borderRadius:12, padding:24, width:"min(660px,95vw)", maxHeight:"85vh", overflow:"auto", border:`1px solid ${C.border}` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div style={{ fontWeight:600, fontSize:15, color:C.accent }}>{modal.title}</div>
              <button style={{ ...btn(C.border,C.textSec), padding:"4px 10px", fontSize:12 }} onClick={()=>setModal(null)}>✕ Κλείσιμο</button>
            </div>

            {modal.type==="print_copy" && (
              <div>
                <div style={{ fontSize:13, color:C.textSec, marginBottom:10, lineHeight:1.7 }}>
                  <strong style={{ color:C.textPri }}>3 βήματα:</strong><br/>
                  1. Πατήστε <strong style={{ color:C.accent }}>📋 Αντιγραφή HTML</strong><br/>
                  2. Ανοίξτε ένα κενό αρχείο .txt, κάντε Paste, αποθηκεύστε ως <strong style={{ color:C.textPri }}>παραγγελια.html</strong><br/>
                  3. Ανοίξτε το αρχείο με Chrome/Safari → <strong style={{ color:C.accent }}>🖨 Εκτύπωση / PDF</strong>
                </div>
                <button style={{ ...btn(C.accent), marginBottom:12 }} onClick={()=>{ navigator.clipboard?.writeText(modal.html).then(()=>{ const b=document.getElementById("cpbtn"); if(b){b.textContent="✓ Αντιγράφηκε!";b.style.background=C.green;} }); }} id="cpbtn">
                  📋 Αντιγραφή HTML
                </button>
                <textarea readOnly value={modal.html} style={{ ...inp, minHeight:220, fontFamily:"monospace", fontSize:11, resize:"vertical", display:"block" }}/>
              </div>
            )}

            {modal.type==="email" && (
              <div>
                <div style={{ fontSize:12, color:C.textSec, marginBottom:8 }}>
                  Αντιγράψτε το παρακάτω μήνυμα και στείλτε το στο: <strong style={{ color:C.accent }}>{modal.to||"(δεν υπάρχει email)"}</strong>
                </div>

// ── Tab Κύρια Μέτρηση ──────────────────────────────────────────────────────────
function TabKyria({ project, up }) {
  const wins = project.windows||[];
  const km   = project.kmWins||wins.map(w=>({...w}));
  const upK  = (id,k,v) => up({ kmWins: km.map(w=>w.id===id?{...w,[k]:v}:w) });

  const leaves = typology => typology?.includes("ΤΡΙΦΥΛΛΟ")?3:typology?.includes("ΔΙΦΥΛΛΟ")?2:1;

  return (
    <div>
      <div style={{ fontWeight:600, marginBottom:4 }}>Κύρια Μέτρηση</div>
      <div style={{ fontSize:12, color:C.textSec, marginBottom:14 }}>Οριστικές διαστάσεις → κοπές προφίλ, τζάμια, εξαρτήματα</div>
      {wins.length===0&&<div style={{ color:C.textMut }}>Δεν υπάρχουν κουφώματα.</div>}
      {km.map(w=>{
        const h=+w.height||0, wi=+w.width||0;
        const lv=leaves(w.typology);
        const cuts=[
          { prof:w.kasaCode||`${w.series}-ΚΑΣΑ`, type:"Κάσα Οριζόντια", len:wi.toFixed(3), qty:2 },
          { prof:w.kasaCode||`${w.series}-ΚΑΣΑ`, type:"Κάσα Κατακόρυφη", len:h.toFixed(3), qty:2 },
          ...(!w.typology?.includes("ΣΤΑΘΕΡΟ")
            ? [{ prof:w.fyloCode||`${w.series}-ΦΥΛΛΟ`, type:"Φύλλο Οριζόντιο", len:(wi-0.04).toFixed(3), qty:2 },
               { prof:w.fyloCode||`${w.series}-ΦΥΛΛΟ`, type:"Φύλλο Κατακόρυφο", len:(h-0.04).toFixed(3), qty:2 }]
            : []),
          ...(w.typology?.includes("ΤΑΦ")
            ? [{ prof:`${w.series}-ΜΕΣΟΒΕΡΓΑ`, type:"Μεσόβεργα", len:(h-0.02).toFixed(3), qty:1 }]
            : []),
        ];
        const glass = h&&wi ? { spec:w.glass, w:((wi/lv)-0.02).toFixed(3), h:(h-0.02).toFixed(3), qty:lv } : null;
        const isAnoig=w.type==="ΑΝΟΙΓΟΜΕΝΟ"||w.type==="ΠΟΡΤΑ", isSyr=w.type==="ΣΥΡΟΜΕΝΟ";
        const acc=[
          ...(isAnoig?[{n:"Μεντεσέδες",q:lv*2,u:"τεμ"},{n:"Κλειδαριά",q:lv,u:"τεμ"},{n:"Χερούλι",q:lv,u:"τεμ"}]:[]),
          ...(isSyr?[{n:"Ράουλα",q:lv*2,u:"τεμ"},{n:"Αντιανεμικό",q:1,u:"τεμ"}]:[]),
          {n:"Παρεμβύσματα",q:(2*h+2*wi).toFixed(1),u:"m"},
        ];
        return (
          <div key={w.id} style={{ ...card, marginBottom:14 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10, paddingBottom:8, borderBottom:`1px dashed ${C.border}` }}>
              <span style={{ fontWeight:600, color:C.accent }}>Κούφωμα {w.no} — {w.typology||w.type} — {w.series}</span>
              <span style={badge(C.blue)}>{w.color}</span>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, marginBottom:12 }}>
              <F label="Ύψος Οριστικό (m)" value={w.height} onChange={v=>upK(w.id,"height",v)} ph="0,00"/>
              <F label="Πλάτος Οριστικό (m)" value={w.width}  onChange={v=>upK(w.id,"width",v)}  ph="0,00"/>
              <F label="Κωδ. Κάσας"  value={w.kasaCode||""} onChange={v=>upK(w.id,"kasaCode",v)}/>
              <F label="Κωδ. Φύλλου" value={w.fyloCode||""} onChange={v=>upK(w.id,"fyloCode",v)}/>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
              <div>
                <div style={{ fontSize:11, color:C.textSec, marginBottom:6, textTransform:"uppercase", letterSpacing:"0.05em" }}>Κοπές Προφίλ</div>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                  <thead><tr>{["Κωδ.","Τύπος","m","Τεμ."].map(h2=><th key={h2} style={{ ...th, padding:"4px 6px" }}>{h2}</th>)}</tr></thead>
                  <tbody>{cuts.map((c,i)=><tr key={i}><td style={{ ...td, padding:"4px 6px", fontSize:11, color:C.accent }}>{c.prof}</td><td style={{ ...td, padding:"4px 6px" }}>{c.type}</td><td style={{ ...td, padding:"4px 6px", fontWeight:600 }}>{c.len}</td><td style={{ ...td, padding:"4px 6px" }}>{c.qty}</td></tr>)}</tbody>
                </table>
              </div>
              <div>
                <div style={{ fontSize:11, color:C.textSec, marginBottom:6, textTransform:"uppercase", letterSpacing:"0.05em" }}>Τζάμια</div>
                {glass
                  ? <div style={{ background:C.bg, borderRadius:8, padding:"10px 12px" }}>
                      <div style={{ fontWeight:600, color:C.blue, marginBottom:4 }}>{glass.spec}</div>
                      <div style={{ fontSize:13 }}>{glass.w} × {glass.h} m</div>
                      <div style={{ fontSize:12, color:C.textSec, marginTop:2 }}>Ποσ.: <strong style={{ color:C.textPri }}>{glass.qty} τεμ.</strong></div>
                    </div>
                  : <div style={{ fontSize:12, color:C.textMut }}>Συμπληρώστε διαστάσεις</div>
                }
              </div>
              <div>
                <div style={{ fontSize:11, color:C.textSec, marginBottom:6, textTransform:"uppercase", letterSpacing:"0.05em" }}>Εξαρτήματα</div>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                  <thead><tr>{["Εξάρτημα","Ποσ.","Μον."].map(h2=><th key={h2} style={{ ...th, padding:"4px 6px" }}>{h2}</th>)}</tr></thead>
                  <tbody>{acc.map((a,i)=><tr key={i}><td style={{ ...td, padding:"4px 6px" }}>{a.n}</td><td style={{ ...td, padding:"4px 6px", fontWeight:600, color:C.green }}>{a.q}</td><td style={{ ...td, padding:"4px 6px" }}>{a.u}</td></tr>)}</tbody>
                </table>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Tab Παραστατικά ───────────────────────────────────────────────────────────
function TabInvoices({ project, up }) {
  const [aiLoad,setAiLoad]=useState(false);
  const invoices=project.invoices||[], payments=project.payments||[];
  const totInv=invoices.reduce((s,i)=>s+(+i.amount||0),0);
  const totCat=payments.filter(p=>p.method==="Κατάθεση").reduce((s,p)=>s+(+p.net||0)+(+p.vat||0),0);
  const bal=totCat-totInv;
  const handleFile=async(e)=>{
    const f=e.target.files[0]; if(!f) return; setAiLoad(true);
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      try {
        const b64=ev.target.result.split(",")[1];
        const content=f.type.startsWith("image/")
          ?[{type:"image",source:{type:"base64",media_type:f.type,data:b64}},{type:"text",text:'Παραστατικό. Βρες ποσό, ημερομηνία. ΜΟΝΟ JSON: {"amount":0,"date":""}'}]
          :`Παραστατικό. Βρες ποσό ημερομηνία. ΜΟΝΟ JSON: {"amount":0,"date":""}`;
        const result = await API.callAI([{ role:"user", content }], 200);
        const parsed = parseFirstJSONObject(extractAIText(result), {});
        up({invoices:[...invoices,{id:uid(),filename:f.name,amount:+parsed.amount||0,date:parsed.date||today()}]});
      } catch { up({invoices:[...invoices,{id:uid(),filename:f.name,amount:0,date:today()}]}); }
      setAiLoad(false);
    };
    reader.readAsDataURL(f);
  };
  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div style={{ fontWeight:600 }}>Παραστατικά</div>
        <label style={{ ...btn(C.accent), cursor:"pointer", opacity:aiLoad?0.7:1 }}>
          {aiLoad?"AI Διαβάζει...":"📎 Επισύναψη Παραστατικού"}
          <input type="file" accept="image/*,application/pdf" style={{ display:"none" }} onChange={handleFile} disabled={aiLoad}/>
        </label>
      </div>
      <div style={{ ...card, fontSize:12, color:C.textSec, marginBottom:12 }}>Παραστατικά κόβονται μόνο για καταθέσεις · Σύνολο καταθέσεων: <strong style={{ color:C.blue }}>{totCat.toFixed(2)} €</strong></div>
      <table style={{ width:"100%", borderCollapse:"collapse", background:C.card, borderRadius:10, overflow:"hidden", marginBottom:12 }}>
        <thead><tr>{["Αρχείο","Ποσό €","Ημερομηνία",""].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
        <tbody>
          {invoices.length===0&&<tr><td colSpan={4} style={{ ...td, textAlign:"center", color:C.textMut, padding:20 }}>Δεν υπάρχουν παραστατικά</td></tr>}
          {invoices.map(i=><tr key={i.id}><td style={td}>📄 {i.filename}</td><td style={{ ...td,fontWeight:600,color:C.blue }}>{(+i.amount||0).toFixed(2)}</td><td style={td}>{i.date}</td><td style={td}><button style={{ ...btn(C.red),padding:"3px 8px",fontSize:11 }} onClick={()=>up({invoices:invoices.filter(x=>x.id!==i.id)})}>✕</button></td></tr>)}
        </tbody>
      </table>
      {invoices.length>0&&<div style={{ ...card, maxWidth:280, marginLeft:"auto" }}>
        {[["Καταθέσεις",totCat.toFixed(2),C.blue],["Κομμένα παραστατικά",totInv.toFixed(2),C.green],["Υπόλοιπο για παραστατικό",bal.toFixed(2),bal<0?C.red:C.accent]].map(([l,v,c])=>(
          <div key={l} style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:`1px solid ${C.border}`, color:C.textPri }}>
            <span style={{ fontSize:13 }}>{l}</span><span style={{ fontWeight:600, color:c }}>{v} €</span>
          </div>
        ))}
      </div>}
    </div>
  );
}

        <h2 style={{ margin:0, fontWeight:600 }}>Προμηθευτές</h2>
        <button style={btn(C.accent)} onClick={()=>setShowNew(true)}>+ Νέος Προμηθευτής</button>
      </div>
      {showNew&&<div style={{ ...card, border:`1px solid ${C.accent}`, marginBottom:12 }}>
        <div style={{ fontWeight:600, marginBottom:10 }}>Νέος Προμηθευτής</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
          <F label="Επωνυμία" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))}/>
          <F label="Υπεύθυνος" value={form.contact} onChange={v=>setForm(f=>({...f,contact:v}))}/>
          <F label="Τηλέφωνο" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))}/>
          <F label="Ηλεκτρονικό Ταχυδρομείο" value={form.email} onChange={v=>setForm(f=>({...f,email:v}))}/>
          <F label="Viber" value={form.viber} onChange={v=>setForm(f=>({...f,viber:v}))}/>
          <div><label style={lbl}>Κατηγορία</label><select style={inp} value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>{TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
        </div>
        <div style={{ display:"flex", gap:8 }}><button style={btn(C.accent)} onClick={save}>Αποθήκευση</button><button style={btn(C.border,C.textPri)} onClick={()=>setShowNew(false)}>Ακύρωση</button></div>
      </div>}
      {del&&<ConfirmDel code={dc} onChange={setDc} onConfirm={()=>{ if(dc===CONFIRM){setSuppliers(s=>s.filter(x=>x.id!==del));setDel(null);setDc("");} }} onCancel={()=>{setDel(null);setDc("");}}/>}
      <table style={{ width:"100%", borderCollapse:"collapse", background:C.card, borderRadius:10, overflow:"hidden" }}>
        <thead><tr>{["Επωνυμία","Υπεύθυνος","Τηλέφωνο","Ηλεκτρονικό Ταχυδρομείο","Viber","Κατηγορία",""].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
        <tbody>{suppliers.map(s=><tr key={s.id}>
          <td style={{ ...td,fontWeight:500,color:C.accent }}>{s.name}</td>
          <td style={td}>{s.contact}</td>
          <td style={td}>{s.phone}</td>
          <td style={td}>{s.email}</td>
          <td style={td}>{s.viber||"—"}</td>
          <td style={td}><span style={badge(C.accent)}>{s.type}</span></td>
          <td style={td}><div style={{ display:"flex", gap:6 }}>
            {s.email&&<button style={{ ...btn("#4a90d9"),padding:"3px 8px",fontSize:11 }} onClick={()=>window.open(`mailto:${s.email}`)}>✉️</button>}
            {s.viber&&<button style={{ ...btn("#7b5ea7"),padding:"3px 8px",fontSize:11 }} onClick={()=>window.open(`viber://chat?number=${s.viber}`)}>📱</button>}
            <button style={{ ...btn(C.red),padding:"3px 8px",fontSize:11 }} onClick={()=>setDel(s.id)}>✕</button>
          </div></td>
        </tr>)}</tbody>
      </table>
    </div>
  );
}

// ── Settings ──────────────────────────────────────────────────────────────────
function Settings({ settings, setSettings }) {
  const handleLogoUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      setSettings(s => ({ ...s, logo: ev.target.result }));
    };
    reader.readAsDataURL(file);
  };

  return (
    <div>
      <h2 style={{ margin: "0 0 8px", fontWeight: 600 }}>Ρυθμίσεις</h2>
      <p style={{ color: C.textSec, fontSize: 13, marginBottom: 20 }}>Ρυθμίσεις εταιρείας για παραστατικά και παραγγελίες</p>
      
      <div style={card}>
        <div style={{ fontWeight: 600, marginBottom: 12, color: C.accent }}>🏢 Λογότυπο Εταιρείας</div>
        <input type="file" accept="image/*" onChange={handleLogoUpload} style={{ marginBottom: 12 }} />
        {settings.logo && (
          <div style={{ marginTop: 10, padding: 10, background: '#fff', borderRadius: 8, display: 'inline-block' }}>
            <img src={settings.logo} style={{ maxWidth: 200, maxHeight: 80, display: 'block' }} alt="Λογότυπο" />
          </div>
        )}
      </div>

      <div style={card}>
        <div style={{ fontWeight: 600, marginBottom: 12 }}>📋 Πληροφορίες Εταιρείας</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
          <F label="Όνομα Εταιρείας" value={settings.companyName || ''} onChange={v => setSettings(s => ({ ...s, companyName: v }))} />
          <F label="ΑΦΜ" value={settings.afm || ''} onChange={v => setSettings(s => ({ ...s, afm: v }))} />
          <F label="ΔΟΥ" value={settings.doy || ''} onChange={v => setSettings(s => ({ ...s, doy: v }))} />
          <F label="Τηλέφωνο" value={settings.phone || ''} onChange={v => setSettings(s => ({ ...s, phone: v }))} />
          <F label="Ηλεκτρονικό Ταχυδρομείο" value={settings.email || ''} onChange={v => setSettings(s => ({ ...s, email: v }))} />
          <F label="Ιστοσελίδα" value={settings.website || ''} onChange={v => setSettings(s => ({ ...s, website: v }))} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 10 }}>
          <F label="Διεύθυνση" value={settings.address || ''} onChange={v => setSettings(s => ({ ...s, address: v }))} />
          <F label="Πόλη" value={settings.city || ''} onChange={v => setSettings(s => ({ ...s, city: v }))} />
        </div>
      </div>
    </div>
  );
}

// ── AI Scanner Component ───────────────────────────────────────────────────────
function AIScanner({ onClose }) {
  const [files, setFiles] = useState([]);
  const [analyzing, setAnalyzing] = useState(false);
  const [extractedData, setExtractedData] = useState(null);
  const [error, setError] = useState(null);

  const handleFileSelect = (e) => {
    const selectedFiles = Array.from(e.target.files || []);
    setFiles(selectedFiles);
    setError(null);
    setExtractedData(null);
  };

  const handleAnalyze = async () => {
    if (files.length === 0) {
      setError('Παρακαλώ επιλέξτε τουλάχιστον μία φωτογραφία');
      return;
    }

    if (!window.google || !window.google.script) {
      setError('⚠️ Το Google Apps Script API δεν είναι διαθέσιμο. Βεβαιωθείτε ότι τρέχετε μέσω Google Apps Script.');
      return;
    }

    setAnalyzing(true);
    setError(null);

    try {
      const base64Images = await Promise.all(
        files.map(file => {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => {
              const base64 = reader.result.split(',')[1];
              resolve(base64);
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });
        })
      );

      console.log(`Analyzing ${base64Images.length} images...`);

      const result = await new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .analyzeAluminumCatalogImages(base64Images);
      });

      if (result.error) {
        setError('Σφάλμα API: ' + result.error);
      } else if (result.data) {
        setExtractedData(result.data);
      } else {
        setError('Κανένα αποτέλεσμα από την ανάλυση');
      }
    } catch (err) {
      setError('Σφάλμα κατά την ανάλυση: ' + err.toString());
      console.error('Analysis error:', err);
    } finally {
      setAnalyzing(false);
    }
  };

  const handleSave = async () => {
    if (!extractedData) return;

    try {
      setAnalyzing(true);
      const result = await new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .saveCatalogData(extractedData);
      });

      if (result.error) {
        setError(result.error);
      } else {
        alert('✓ Δεδομένα αποθηκευμένα επιτυχώς!');
        onClose();
      }
    } catch (err) {
      setError('Σφάλμα κατά την αποθήκευση: ' + err.toString());
      console.error('Save error:', err);
    } finally {
      setAnalyzing(false);
    }
  };

  return (
    <div style={{ ...card, border:`1px solid ${C.accent}` }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <div style={{ fontWeight:600, fontSize:15 }}>🤖 Σαρωτής Καταλόγου AI</div>
        <button style={{ ...btn(C.border, C.textSec), padding:"4px 10px", fontSize:12 }} onClick={onClose}>✕</button>
      </div>

      {!extractedData ? (
        <>
          <div style={{ marginBottom:16 }}>
            <label style={lbl}>Επιλέξτε φωτογραφίες (έως 10)</label>
            <input
              type="file"
              multiple
              accept="image/*"
              onChange={handleFileSelect}
              style={{ ...inp, cursor:"pointer" }}
              disabled={analyzing}
            />
            <div style={{ fontSize:12, color:C.textSec, marginTop:6 }}>
              {files.length > 0 && `${files.length} φωτογραφία(ες) επιλεγμένη(ες)`}
            </div>
          </div>

          {error && <div style={{ ...card, background:C.red+"22", border:`1px solid ${C.red}55`, color:C.red, marginBottom:12, fontSize:13 }}>{error}</div>}

          <div style={{ display:"flex", gap:8 }}>
            <button
              style={btn(C.accent)}
              onClick={handleAnalyze}
              disabled={files.length === 0 || analyzing}
            >
              {analyzing ? "⏳ Ανάλυση..." : "🔍 Ανάλυση με AI"}
            </button>
            <button style={btn(C.border, C.textPri)} onClick={onClose}>Ακύρωση</button>
          </div>
        </>
      ) : (
        <>
          <div style={{ maxHeight:"400px", overflowY:"auto", marginBottom:16, padding:12, background:C.bg, borderRadius:8, fontSize:12 }}>
            <pre style={{ margin:0, color:C.textPri, fontFamily:"monospace" }}>
              {JSON.stringify(extractedData, null, 2)}
            </pre>
          </div>

          {error && <div style={{ ...card, background:C.red+"22", border:`1px solid ${C.red}55`, color:C.red, marginBottom:12, fontSize:13 }}>{error}</div>}

          <div style={{ display:"flex", gap:8 }}>
            <button style={btn(C.green)} onClick={handleSave}>✓ Αποθήκευση</button>
            <button style={btn(C.border, C.textPri)} onClick={() => { setExtractedData(null); setFiles([]); }}>← Επιστροφή</button>
          </div>
        </>
      )}
    </div>
  );
}


    // ══════════════════════════════════════════════════════════════════════════
    // RENDER
    // ══════════════════════════════════════════════════════════════════════════
    
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
